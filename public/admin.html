<!DOCTYPE html>
<html>
<body>
<h1>
  Online Clients:
  <span id="count" style="display:none;"></span>
</h1>

<script>
const el = document.getElementById("count");

const ws = new WebSocket("ws://localhost:3000/ws?role=admin");

ws.onmessage = (e) => {
  el.textContent = e.data;
  el.style.display = "inline"; // 🔥 แสดงก็ต่อเมื่อมีค่าจริง
};
</script>
</body>
</html>
